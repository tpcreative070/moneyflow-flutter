name: moneyflow
description: Smart finance management app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6

  # Google Sign-In
  google_sign_in: ^6.1.6

  # State Management
  provider: ^6.1.1

  # Local Database
  sqflite: ^2.3.0
  path: ^1.8.3

  # Storage
  shared_preferences: ^2.2.2

  # Network
  connectivity_plus: ^5.0.2

  # Image Picker
  image_picker: ^1.0.7

  # Charts
  fl_chart: ^0.65.0

  # UI
  flutter_svg: ^2.0.9
  intl: ^0.18.1
  uuid: ^4.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true